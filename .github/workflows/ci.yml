name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: latest

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: Benchmarks (smoke run)
        run: cd benchmarks && go test -bench="." -benchmem -benchtime=1s .

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.24"
        continue-on-error: true