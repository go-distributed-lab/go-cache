services:

  lru:
    build: .
    profiles: [lru]
    ports:
      - "8080:8080"
    command: ["-strategy=lru", "-capacity=1024", "-addr=:8080"]

  lfu:
    build: .
    profiles: [lfu]
    ports:
      - "8081:8080"
    command: ["-strategy=lfu", "-capacity=1024", "-addr=:8080"]

  fifo:
    build: .
    profiles: [fifo]
    ports:
      - "8082:8080"
    command: ["-strategy=fifo", "-capacity=1024", "-addr=:8080"]

  ttl:
    build: .
    profiles: [ttl]
    ports:
      - "8083:8080"
    command: ["-strategy=ttl", "-ttl=5m", "-addr=:8080"]

  sharded:
    build: .
    profiles: [sharded]
    ports:
      - "8084:8080"
    command: ["-strategy=sharded", "-capacity=1024", "-shards=16", "-addr=:8080"]